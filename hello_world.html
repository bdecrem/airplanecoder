<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 5rem;
            color: white;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            animation: float 3s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .subtitle {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Floating shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            animation: floatShape 6s ease-in-out infinite;
        }

        @keyframes floatShape {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-30px) rotate(90deg); }
            50% { transform: translateY(-60px) rotate(180deg); }
            75% { transform: translateY(-30px) rotate(270deg); }
        }

        .shape:nth-child(odd) { animation-delay: -3s; }
        .shape:nth-child(even) { animation-duration: 8s; }

        /* Bouncing ball */
        .ball {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, #ff6b6b);
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-80px) scale(1.2); }
        }

        /* Stars */
        .star {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World! 🌍</h1>
        <p class="subtitle">Welcome to the web!</p>
    </div>

    <!-- Floating shapes -->
    <div class="shape" style="width: 80px; height: 80px; background: rgba(255, 255, 255, 0.1); top: 10%; left: 10%;"></div>
    <div class="shape" style="width: 60px; height: 60px; background: rgba(255, 255, 255, 0.15); top: 70%; right: 15%; animation-delay: -4s;"></div>
    <div class="shape" style="width: 100px; height: 100px; background: rgba(255, 255, 255, 0.08); top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>

    <!-- Bouncing ball -->
    <div class="ball" style="top: 30%; left: 40%;"></div>
    <div class="ball" style="top: 60%; right: 25%; background: radial-gradient(circle at 30% 30%, #fff, #4ecdc4); animation-delay: -0.5s;"></div>

    <!-- Stars -->
    <div class="star" style="top: 15%; left: 20%;"></div>
    <div class="star" style="top: 80%; left: 30%; animation-delay: -1s;"></div>
    <div class="star" style="top: 40%; right: 25%; animation-delay: -0.5s;"></div>
    <div class="star" style="top: 60%; left: 15%; animation-delay: -1.5s;"></div>
</body>
</html>
